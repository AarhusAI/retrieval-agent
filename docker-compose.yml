networks:
  frontend:
    external: true
  app:
    driver: bridge
    internal: false

services:
  retrieval:
    build:
      dockerfile: Dockerfile
      context: .
      target: ${TARGET:-dev}
      platforms:
        - "linux/amd64"
#        - "linux/arm64"
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - app
      - frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      API_KEY: ${API_KEY:-CHANGE_ME_NOW}
      QDRANT_URI: ${QDRANT_URI:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-123456789}
      QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX:-open-webui}
      QDRANT_MULTITENANCY: ${QDRANT_MULTITENANCY:-true}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-CHANGE_ME_NOW}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-CHANGE_ME_NOW}
      EMBEDDING_QUERY_PREFIX: ${EMBEDDING_QUERY_PREFIX:-'query:'}
      ENABLE_HYBRID_SEARCH: ${ENABLE_HYBRID_SEARCH:-false}
      HYBRID_BM25_WEIGHT: ${HYBRID_BM25_WEIGHT:-0.3}
      BM25_CACHE_TTL_SECONDS: ${BM25_CACHE_TTL_SECONDS:-300}
      ENABLE_RERANKING: ${ENABLE_RERANKING:-false}
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      RERANKER_API_BASE_URL: ${RERANKER_API_BASE_URL:-}
      RERANKER_API_KEY: ${RERANKER_API_KEY:-}
      INITIAL_RETRIEVAL_MULTIPLIER: ${INITIAL_RETRIEVAL_MULTIPLIER:-3}
      ENABLE_QUERY_GENERATION: ${ENABLE_QUERY_GENERATION:-true}
      RETRIEVAL_QUERY_GENERATION_PROMPT_TEMPLATE: ${RETRIEVAL_QUERY_GENERATION_PROMPT_TEMPLATE:-}
      ENABLE_AGENTIC_RAG: ${ENABLE_AGENTIC_RAG:-false}
      AGENT_MODEL: ${AGENT_MODEL:-gpt-4o-mini}
      AGENT_API_BASE_URL: ${AGENT_API_BASE_URL:-http://litellm:4000/v1}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-3}
      AGENT_TOOL_PREVIEW_CHARS: ${AGENT_TOOL_PREVIEW_CHARS:-200}
      AGENT_STRICT_TOOLS: ${AGENT_STRICT_TOOLS:-true}
      AGENT_TIMEOUT: ${AGENT_TIMEOUT:-60}
      AGENT_SYSTEM_PROMPT: ${AGENT_SYSTEM_PROMPT:-}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./:/app
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${COMPOSE_DOMAIN}`)"
      #  HTTPS config - uncomment to enable redirect from :80 to :443
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
